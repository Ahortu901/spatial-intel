<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spatial Intelligence — Live Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e14;
    --bg2: #111820;
    --bg3: #1a2330;
    --border: #1e3040;
    --text: #c8d8e8;
    --text2: #7090a8;
    --accent: #00c8ff;
    --green: #00e890;
    --amber: #ffb020;
    --red: #ff4040;
    --purple: #9060ff;
    --teal: #00c8a0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-rows: 44px 1fr;
    grid-template-columns: 1fr;
  }

  /* Header */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 20px;
  }
  .logo { color: var(--accent); font-size: 15px; font-weight: bold; letter-spacing: 2px; }
  .mode-badge {
    background: var(--bg3); border: 1px solid var(--border);
    padding: 3px 10px; border-radius: 3px; font-size: 11px; color: var(--accent);
  }
  .header-stats { display: flex; gap: 20px; margin-left: auto; }
  .hstat { display: flex; gap: 6px; align-items: baseline; }
  .hstat-val { font-size: 18px; font-weight: bold; }
  .hstat-lbl { font-size: 10px; color: var(--text2); }
  .person-val { color: var(--green); }
  .vehicle-val { color: var(--amber); }
  .drone-val { color: var(--purple); }
  .pir-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text2); transition: background 0.3s; }
  .pir-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }

  /* Main grid */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 300px;
    grid-template-rows: 1fr 200px;
    gap: 1px;
    background: var(--border);
    overflow: hidden;
  }

  .panel {
    background: var(--bg);
    overflow: hidden;
    position: relative;
  }
  .panel-title {
    font-size: 10px; letter-spacing: 1.5px; color: var(--text2);
    padding: 8px 12px 4px;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
  }

  /* Radar canvas panel */
  #radar-panel { grid-row: 1 / 2; grid-column: 1 / 2; }
  #radar-canvas { display: block; }

  /* Target list panel */
  #target-panel {
    grid-row: 1 / 2; grid-column: 2 / 3;
    display: flex; flex-direction: column;
  }
  #target-list { flex: 1; overflow-y: auto; }
  .target-card {
    border-bottom: 1px solid var(--border);
    padding: 8px 12px;
    cursor: default;
    transition: background 0.15s;
  }
  .target-card:hover { background: var(--bg3); }
  .target-card.alert { border-left: 3px solid var(--red); }
  .target-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .target-id { font-size: 11px; color: var(--accent); }
  .target-class {
    font-size: 10px; padding: 1px 6px; border-radius: 2px;
    text-transform: uppercase; font-weight: bold;
  }
  .cls-person  { background: rgba(0,232,144,0.15); color: var(--green); }
  .cls-vehicle { background: rgba(255,176,32,0.15); color: var(--amber); }
  .cls-drone   { background: rgba(144,96,255,0.15); color: var(--purple); }
  .cls-unknown { background: rgba(120,144,168,0.15); color: var(--text2); }
  .target-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
  .ts-row { display: flex; justify-content: space-between; }
  .ts-key { color: var(--text2); }
  .ts-val { color: var(--text); }
  .vitals-bar {
    margin-top: 4px; height: 24px;
    position: relative; overflow: hidden;
  }
  .vitals-canvas { width: 100%; height: 100%; }
  .alert-tag { color: var(--red); font-size: 10px; margin-top: 3px; }

  /* Bottom left — alerts log */
  #alert-panel { grid-row: 2 / 3; grid-column: 1 / 2; }
  #alert-log { padding: 4px 12px; overflow-y: auto; height: calc(100% - 28px); }
  .alert-entry { padding: 3px 0; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
  .alert-time { color: var(--text2); white-space: nowrap; }
  .alert-msg { color: var(--red); }
  .event-msg { color: var(--amber); }
  .info-msg { color: var(--teal); }

  /* Bottom right — environment map */
  #env-panel { grid-row: 2 / 3; grid-column: 2 / 3; }
  #env-content { padding: 8px 12px; overflow-y: auto; height: calc(100% - 28px); }
  .zone-row {
    padding: 4px 0; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between;
  }
  .zone-name { color: var(--text2); }
  .zone-status { font-size: 11px; }
  .zone-clear { color: var(--green); }
  .zone-anomaly { color: var(--red); }
  .zone-cal { color: var(--amber); }

  /* Controls overlay */
  #controls {
    position: absolute; bottom: 8px; right: 8px;
    display: flex; gap: 6px; z-index: 10;
  }
  .ctrl-btn {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); padding: 5px 10px; font-family: inherit;
    font-size: 11px; cursor: pointer; border-radius: 2px;
    transition: border-color 0.2s;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn.active { border-color: var(--green); color: var(--green); }

  /* Calibration overlay */
  #cal-overlay {
    display: none; position: absolute; inset: 0;
    background: rgba(0,0,0,0.7);
    align-items: center; justify-content: center;
    z-index: 20;
  }
  #cal-overlay.visible { display: flex; }
  .cal-box {
    background: var(--bg2); border: 1px solid var(--accent);
    padding: 24px; text-align: center; min-width: 260px;
  }
  .cal-title { color: var(--accent); font-size: 14px; margin-bottom: 12px; letter-spacing: 1px; }
  .cal-bar-bg { background: var(--bg3); height: 8px; border-radius: 4px; margin: 12px 0; }
  .cal-bar-fill { background: var(--accent); height: 100%; border-radius: 4px; width: 0%; transition: width 0.5s; }
  .cal-pct { color: var(--accent); font-size: 20px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .no-targets { color: var(--text2); padding: 20px 12px; text-align: center; font-size: 11px; }
</style>
</head>
<body>

<header>
  <div class="logo">SPATIAL INTEL</div>
  <div class="mode-badge" id="mode-badge">ACTIVE</div>
  <div style="display:flex;align-items:center;gap:6px">
    <div class="conn-dot" id="conn-dot" style="background:var(--red)"></div>
    <span style="font-size:11px;color:var(--text2)" id="conn-label">CONNECTING</span>
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <div class="pir-dot" id="pir-dot"></div>
    <span style="font-size:10px;color:var(--text2)">PIR</span>
  </div>
  <div class="header-stats">
    <div class="hstat">
      <span class="hstat-val person-val" id="count-person">0</span>
      <span class="hstat-lbl">PERSONS</span>
    </div>
    <div class="hstat">
      <span class="hstat-val vehicle-val" id="count-vehicle">0</span>
      <span class="hstat-lbl">VEHICLES</span>
    </div>
    <div class="hstat">
      <span class="hstat-val drone-val" id="count-drone">0</span>
      <span class="hstat-lbl">DRONES</span>
    </div>
    <div class="hstat">
      <span class="hstat-val" id="count-total" style="color:var(--accent)">0</span>
      <span class="hstat-lbl">TOTAL</span>
    </div>
  </div>
  <div style="color:var(--text2);font-size:10px;margin-left:auto" id="ts-label">--:--:--</div>
</header>

<div class="main-grid">

  <!-- Radar spatial image -->
  <div class="panel" id="radar-panel">
    <div class="panel-title">through-wall spatial image — back-projection</div>
    <canvas id="radar-canvas"></canvas>
    <div id="controls">
      <button class="ctrl-btn" onclick="calibrate()">CALIBRATE</button>
      <button class="ctrl-btn" id="mode-btn" onclick="cycleMode()">MODE: ACTIVE</button>
    </div>
  </div>

  <!-- Target list -->
  <div class="panel" id="target-panel">
    <div class="panel-title">confirmed targets</div>
    <div id="target-list"><div class="no-targets">awaiting detections...</div></div>
  </div>

  <!-- Alert log -->
  <div class="panel" id="alert-panel">
    <div class="panel-title">event log</div>
    <div id="alert-log"></div>
  </div>

  <!-- Environment map -->
  <div class="panel" id="env-panel">
    <div class="panel-title">environment map</div>
    <div id="env-content"><div style="color:var(--text2);padding:12px;font-size:11px">no fingerprint baseline — run CALIBRATE</div></div>
  </div>

</div>

<!-- Calibration overlay -->
<div id="cal-overlay">
  <div class="cal-box">
    <div class="cal-title">CALIBRATING BASELINE</div>
    <div style="font-size:11px;color:var(--text2);margin-bottom:8px">Keep area clear of targets</div>
    <div class="cal-pct" id="cal-pct">0%</div>
    <div class="cal-bar-bg"><div class="cal-bar-fill" id="cal-bar"></div></div>
    <div style="font-size:10px;color:var(--text2)" id="cal-status">collecting...</div>
  </div>
</div>

<script>
const WS_URL = `ws://${location.host}/ws`;
let ws = null;
let state = null;
const MODES = ["active", "lpi", "passive"];
let modeIdx = 0;

// Vital sign waveform buffers per target
const waveformBuffers = {};

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    document.getElementById('conn-dot').style.background = 'var(--green)';
    document.getElementById('conn-label').textContent = 'LIVE';
    logEvent('System connected', 'info');
    ws.send(JSON.stringify({action: 'ping'}));
  };
  ws.onclose = () => {
    document.getElementById('conn-dot').style.background = 'var(--red)';
    document.getElementById('conn-label').textContent = 'RECONNECTING';
    setTimeout(connect, 2000);
  };
  ws.onerror = () => {};
  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'state_update') handleState(data);
    } catch {}
  };
}

// ── State handler ─────────────────────────────────────────────────────────────
function handleState(data) {
  state = data;

  // Header counts
  document.getElementById('count-person').textContent  = data.counts.person;
  document.getElementById('count-vehicle').textContent = data.counts.vehicle;
  document.getElementById('count-drone').textContent   = data.counts.drone;
  document.getElementById('count-total').textContent   = data.counts.total;

  // PIR
  document.getElementById('pir-dot').classList.toggle('active', data.pir);

  // Timestamp
  const d = new Date(data.timestamp * 1000);
  document.getElementById('ts-label').textContent =
    d.toTimeString().slice(0,8) + '.' + String(d.getMilliseconds()).padStart(3,'0');

  // Calibration
  if (data.calibrating) {
    document.getElementById('cal-overlay').classList.add('visible');
    const pct = Math.round((data.cal_progress || 0) * 100);
    document.getElementById('cal-pct').textContent = pct + '%';
    document.getElementById('cal-bar').style.width = pct + '%';
  } else {
    document.getElementById('cal-overlay').classList.remove('visible');
  }

  renderRadarImage(data);
  renderTargets(data.targets || []);
  renderEnvironment(data.environment || {});

  // Alerts
  for (const alert of (data.alerts || [])) {
    logEvent(alert, 'alert');
  }
}

// ── Radar image renderer ──────────────────────────────────────────────────────
function renderRadarImage(data) {
  const canvas = document.getElementById('radar-canvas');
  const panel  = document.getElementById('radar-panel');
  const w = panel.clientWidth;
  const h = panel.clientHeight - 28;
  canvas.width  = w;
  canvas.height = h;

  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0a0e14';
  ctx.fillRect(0, 0, w, h);

  const image = data.radar_image;
  if (image && image.length > 0) {
    const rows = image.length;
    const cols = image[0].length;
    const cellW = w / cols;
    const cellH = h / rows;

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const v = image[rows - 1 - r][c];    // flip Y so radar is at bottom
        if (v < 0.15) continue;
        const intensity = Math.min(1, v);
        // Colour map: dark blue → cyan → white
        let red, green, blue;
        if (intensity < 0.4) {
          const t = intensity / 0.4;
          red = 0; green = Math.round(t * 180); blue = Math.round(100 + t * 155);
        } else if (intensity < 0.7) {
          const t = (intensity - 0.4) / 0.3;
          red = Math.round(t * 40); green = Math.round(180 + t * 50); blue = 255;
        } else {
          const t = (intensity - 0.7) / 0.3;
          red = Math.round(40 + t * 215); green = Math.round(230 + t * 25); blue = 255;
        }
        ctx.fillStyle = `rgb(${red},${green},${blue})`;
        ctx.fillRect(Math.floor(c * cellW), Math.floor(r * cellH),
                     Math.ceil(cellW) + 1, Math.ceil(cellH) + 1);
      }
    }
  }

  // Draw range rings and grid
  ctx.strokeStyle = 'rgba(0,200,255,0.12)';
  ctx.setLineDash([3, 6]);
  ctx.lineWidth = 0.5;
  const cx = w / 2;
  const rangeM = (data.image_axes && data.image_axes.y_m) ?
    data.image_axes.y_m[data.image_axes.y_m.length - 1] : 15;
  const pixPerM = h / rangeM;
  for (let r = 3; r <= rangeM; r += 3) {
    const py = h - r * pixPerM;
    ctx.beginPath();
    ctx.moveTo(0, py); ctx.lineTo(w, py);
    ctx.stroke();
    ctx.fillStyle = 'rgba(0,200,255,0.4)';
    ctx.font = '10px Courier New';
    ctx.fillText(r + 'm', 4, py - 2);
  }
  ctx.setLineDash([]);

  // Draw centreline
  ctx.strokeStyle = 'rgba(0,200,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, h); ctx.stroke();

  // Radar position marker
  ctx.fillStyle = 'rgba(0,200,255,0.7)';
  ctx.beginPath();
  ctx.moveTo(cx, h - 2);
  ctx.lineTo(cx - 8, h - 16);
  ctx.lineTo(cx + 8, h - 16);
  ctx.closePath();
  ctx.fill();

  // Draw target overlays
  const targets = data.targets || [];
  for (const t of targets) {
    const xAxes = (data.image_axes && data.image_axes.x_m) ? data.image_axes.x_m : [];
    const xRange = xAxes.length > 1 ? xAxes[xAxes.length-1] - xAxes[0] : 10;
    const tx = cx + (t.x_m / (xRange / 2)) * (w / 2);
    const ty = h - (t.y_m / rangeM) * h;

    if (ty < 0 || ty > h || tx < 0 || tx > w) continue;

    // Blob
    const r = t.class_conf > 0.6 ? 14 : 10;
    const clr = t.class === 'person' ? '0,232,144' :
                t.class === 'vehicle' ? '255,176,32' :
                t.class === 'drone' ? '144,96,255' : '120,144,168';

    const grad = ctx.createRadialGradient(tx, ty, 0, tx, ty, r * 2);
    grad.addColorStop(0, `rgba(${clr},0.9)`);
    grad.addColorStop(0.4, `rgba(${clr},0.4)`);
    grad.addColorStop(1, `rgba(${clr},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(tx, ty, r * 2, 0, Math.PI * 2);
    ctx.fill();

    // Alert ring
    if (t.is_alert) {
      ctx.strokeStyle = 'rgba(255,64,64,0.8)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(tx, ty, r * 2.5, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Track history trail
    if (t.history && t.history.length > 1) {
      ctx.strokeStyle = `rgba(${clr},0.25)`;
      ctx.lineWidth = 1;
      ctx.setLineDash([2, 3]);
      ctx.beginPath();
      for (let i = 0; i < t.history.length; i++) {
        const [hx, hy] = t.history[i];
        const phx = cx + (hx / (xRange / 2)) * (w / 2);
        const phy = h - (hy / rangeM) * h;
        i === 0 ? ctx.moveTo(phx, phy) : ctx.lineTo(phx, phy);
      }
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Label
    ctx.fillStyle = `rgba(${clr},0.9)`;
    ctx.font = '10px Courier New';
    ctx.fillText(`${t.id} ${t.range_m}m`, tx + r + 2, ty - 4);
    if (t.breath_bpm) {
      ctx.fillText(`BR:${t.breath_bpm}`, tx + r + 2, ty + 8);
    }
  }
}

// ── Target list renderer ──────────────────────────────────────────────────────
function renderTargets(targets) {
  const list = document.getElementById('target-list');
  if (!targets.length) {
    list.innerHTML = '<div class="no-targets">no confirmed targets</div>';
    return;
  }

  list.innerHTML = targets.map(t => {
    const clsColour = t.class === 'person'  ? 'cls-person'  :
                      t.class === 'vehicle' ? 'cls-vehicle' :
                      t.class === 'drone'   ? 'cls-drone'   : 'cls-unknown';
    const brStr = t.breath_bpm ? `${t.breath_bpm} br/min` : '—';
    const hrStr = t.hr_bpm ? `~${t.hr_bpm} BPM` : '—';
    const velStr = `${t.velocity_mps} m/s`;
    const dwellStr = t.dwell_s > 60 ?
      `${Math.floor(t.dwell_s/60)}m ${Math.round(t.dwell_s%60)}s` :
      `${t.dwell_s}s`;
    const confPct = Math.round((t.class_conf || 0) * 100);
    const sensorsStr = (t.confirmed_by || ['radar']).join('+');

    return `<div class="target-card ${t.is_alert ? 'alert' : ''}">
      <div class="target-header">
        <span class="target-id">${t.id}</span>
        <span class="target-class ${clsColour}">${t.class} ${confPct}%</span>
      </div>
      <div class="target-stats">
        <div class="ts-row"><span class="ts-key">range</span><span class="ts-val">${t.range_m}m</span></div>
        <div class="ts-row"><span class="ts-key">az</span><span class="ts-val">${t.az_deg}°</span></div>
        <div class="ts-row"><span class="ts-key">vel</span><span class="ts-val">${velStr}</span></div>
        <div class="ts-row"><span class="ts-key">dwell</span><span class="ts-val">${dwellStr}</span></div>
        <div class="ts-row"><span class="ts-key">breath</span><span class="ts-val" style="color:var(--green)">${brStr}</span></div>
        <div class="ts-row"><span class="ts-key">HR est</span><span class="ts-val" style="color:var(--green)">${hrStr}</span></div>
        <div class="ts-row"><span class="ts-key">sensors</span><span class="ts-val" style="color:var(--teal)">${sensorsStr}</span></div>
        <div class="ts-row"><span class="ts-key">vitals</span><span class="ts-val">${t.vitals_status}</span></div>
      </div>
      ${t.is_alert ? `<div class="alert-tag">⚠ ${t.alert}</div>` : ''}
    </div>`;
  }).join('');
}

// ── Environment map renderer ──────────────────────────────────────────────────
function renderEnvironment(envMap) {
  const el = document.getElementById('env-content');
  const zones = Object.entries(envMap);
  if (!zones.length) {
    el.innerHTML = '<div style="color:var(--text2);padding:12px;font-size:11px">no zones calibrated</div>';
    return;
  }
  el.innerHTML = zones.map(([zone, info]) => {
    const isAnomaly = info.status === 'anomaly';
    const cls = isAnomaly ? 'zone-anomaly' : 'zone-clear';
    const label = isAnomaly ? `${info.anomaly_type} (${info.score})` :
                  `clear ${info.baseline_match_pct}%`;
    const desc = info.description ? `<div style="font-size:10px;color:var(--text2);margin-top:2px">${info.description}</div>` : '';
    return `<div class="zone-row">
      <span class="zone-name">${zone}</span>
      <span class="zone-status ${cls}">${label}</span>
    </div>${desc}`;
  }).join('');
}

// ── Event log ─────────────────────────────────────────────────────────────────
let logCount = 0;
function logEvent(msg, type = 'info') {
  const log = document.getElementById('alert-log');
  const now = new Date();
  const ts = now.toTimeString().slice(0, 8);
  const cls = type === 'alert' ? 'alert-msg' : type === 'event' ? 'event-msg' : 'info-msg';
  const entry = document.createElement('div');
  entry.className = 'alert-entry';
  entry.innerHTML = `<span class="alert-time">${ts}</span><span class="${cls}">${msg}</span>`;
  log.prepend(entry);
  logCount++;
  if (logCount > 100) log.lastChild && log.removeChild(log.lastChild);
}

// ── Controls ──────────────────────────────────────────────────────────────────
function calibrate() {
  const zone = prompt('Zone name to calibrate:', 'default');
  if (!zone) return;
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({action: 'calibrate', zone}));
    logEvent(`Calibration started for zone: ${zone}`, 'event');
  }
}

function cycleMode() {
  modeIdx = (modeIdx + 1) % MODES.length;
  const mode = MODES[modeIdx];
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({action: 'set_mode', mode}));
  }
  document.getElementById('mode-btn').textContent = `MODE: ${mode.toUpperCase()}`;
  document.getElementById('mode-badge').textContent = mode.toUpperCase();
  logEvent(`Mode changed to ${mode.toUpperCase()}`, 'event');
}

// ── Fetch initial status ──────────────────────────────────────────────────────
async function fetchStatus() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    document.getElementById('mode-badge').textContent = (data.mode || 'active').toUpperCase();
  } catch {}
}

// ── Init ──────────────────────────────────────────────────────────────────────
connect();
fetchStatus();
logEvent('Spatial Intelligence System initialised', 'info');

// Clock
setInterval(() => {
  const d = new Date();
  document.getElementById('ts-label').textContent = d.toTimeString().slice(0, 8);
}, 1000);
